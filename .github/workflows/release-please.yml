# .github/workflows/release-please.yml
name: Release Please

on:
  push:
    branches:
      - release
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    timeout-minutes: 60 # Increased for large repos
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
      upload_url: ${{ steps.release.outputs.upload_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Full history for better changelog generation

      - name: Release Please
        id: release
        uses: googleapis/release-please-action@v4
        with:
          token: ${{ secrets.RELEASE_PLEASE_TOKEN }}
          release-type: node
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
          target-branch: release

  build-and-release:
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        include:
          - os: ubuntu-latest
            platform: linux
          - os: windows-latest
            platform: windows
          - os: macos-latest
            platform: macos

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Clear npm cache (Windows)
        if: matrix.os == 'windows-latest'
        run: npm cache clean --force

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Rebuild native modules
        run: npm rebuild

      - name: Install app dependencies
        run: npx electron-builder install-app-deps

      - name: Run postinstall
        run: npm run postinstall

      - name: Run install shared
        run: |
          cd shared
          npm i

      - name: Build application
        run: npm run build:dev
        env:
          NODE_ENV: production

      - name: Verify build output
        run: |
          echo "Contents of dist directory:"
          ls -la dist/ || echo "dist directory not found"
          echo "Contents of dist/main:"
          ls -la dist/main/ || echo "dist/main directory not found"
          echo "Contents of dist/renderer:"
          ls -la dist/renderer/ || echo "dist/renderer directory not found"
        shell: bash

      - name: Build Electron app
        run: npm run build:app
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NODE_ENV: production

      - name: List built files (debug)
        run: |
          echo "Contents of dist directory after electron-builder:"
          ls -la dist/ || echo "dist directory not found"
        shell: bash

      - name: List built files (debug)
        run: |
          echo "Contents of electron-dist directory after electron-builder:"
          ls -la electron-dist/ || echo "electron-dist directory not found"
        shell: bash

      - name: Upload Release Assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.release-please.outputs.tag_name }}
          files: |
            electron-dist/*.exe
            electron-dist/*.dmg
            electron-dist/*.AppImage
            electron-dist/*.deb
            electron-dist/*.rpm
            electron-dist/*.tar.gz
            electron-dist/*.zip
            electron-dist/latest*.yml
          fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
